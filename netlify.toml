# Site LPJ — 21 histoires
# Landing scrollytelling éditoriale · projet bibliothèques Haïti

[build]
  # Site statique pur — aucune commande de build
  publish = "."

# Racine → sélecteur (le client choisit entre v2 et v3)
# À simplifier en redirect direct vers /index-v2.html ou /index-v3.html
# une fois la version retenue.
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200
  force = false

# Alias propres pour partager les deux versions
[[redirects]]
  from = "/v2"
  to = "/index-v2.html"
  status = 200

[[redirects]]
  from = "/v3"
  to = "/index-v3.html"
  status = 200

# Headers de sécurité standards
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache long pour les assets immuables (SVG)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache modéré pour CSS/JS (auto-busté à chaque déploiement)
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
