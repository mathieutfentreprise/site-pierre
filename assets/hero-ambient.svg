<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Ambiance — bibliothèque, livres, lumière chaude">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"  stop-color="#3a1a0e"/>
      <stop offset=".5" stop-color="#7a3a1a"/>
      <stop offset="1"  stop-color="#1a0f08"/>
    </linearGradient>
    <radialGradient id="sun" cx="78%" cy="38%" r="35%">
      <stop offset="0"   stop-color="#f6d28a" stop-opacity=".95"/>
      <stop offset=".25" stop-color="#e09a35" stop-opacity=".55"/>
      <stop offset="1"   stop-color="#e09a35" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shelf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a160a"/>
      <stop offset="1" stop-color="#180a04"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="grain2">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 .8  0 0 0 0 .5  0 0 0 0 .2  0 0 0 .04 0"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#sun)"/>

  <!-- distant mountains (Haiti horizon hint) -->
  <g opacity=".7">
    <path d="M0 560 L180 470 340 540 520 440 700 520 880 460 1060 530 1240 470 1420 530 1600 480 1600 900 0 900 Z"
          fill="#1a0a04"/>
    <path d="M0 600 L160 540 320 600 500 530 680 600 860 540 1040 600 1220 540 1400 600 1600 555 1600 900 0 900 Z"
          fill="#0e0602" opacity=".75"/>
  </g>

  <!-- bookshelf silhouette in foreground -->
  <g>
    <!-- shelf base -->
    <rect x="0" y="700" width="1600" height="200" fill="url(#shelf)"/>
    <!-- books -->
    <g>
      <rect x="60"   y="560" width="42"  height="140" fill="#5a1a14"/>
      <rect x="106"  y="540" width="34"  height="160" fill="#8b3a1f"/>
      <rect x="144"  y="570" width="48"  height="130" fill="#3a2010"/>
      <rect x="196"  y="550" width="30"  height="150" fill="#c97a28"/>
      <rect x="230"  y="565" width="42"  height="135" fill="#5a1a14"/>
      <rect x="276"  y="545" width="36"  height="155" fill="#3a5436" opacity=".9"/>
      <rect x="316"  y="575" width="40"  height="125" fill="#7a2a1a"/>
      <rect x="360"  y="555" width="34"  height="145" fill="#a85e15"/>
      <rect x="398"  y="565" width="46"  height="135" fill="#3a2010"/>
      <rect x="448"  y="545" width="32"  height="155" fill="#8b3a1f"/>
      <rect x="484"  y="568" width="42"  height="132" fill="#5a1a14"/>
      <rect x="530"  y="550" width="36"  height="150" fill="#c97a28" opacity=".85"/>
      <rect x="570"  y="572" width="40"  height="128" fill="#3a2010"/>
      <rect x="614"  y="555" width="32"  height="145" fill="#7a2a1a"/>
      <rect x="650"  y="540" width="44"  height="160" fill="#5a1a14"/>
      <rect x="698"  y="565" width="36"  height="135" fill="#a85e15"/>
      <rect x="738"  y="555" width="42"  height="145" fill="#3a2010"/>

      <rect x="900"  y="558" width="40"  height="142" fill="#5a1a14"/>
      <rect x="944"  y="540" width="36"  height="160" fill="#3a5436"/>
      <rect x="984"  y="565" width="46"  height="135" fill="#8b3a1f"/>
      <rect x="1034" y="552" width="32"  height="148" fill="#c97a28"/>
      <rect x="1070" y="568" width="42"  height="132" fill="#3a2010"/>
      <rect x="1116" y="548" width="36"  height="152" fill="#7a2a1a"/>
      <rect x="1156" y="562" width="40"  height="138" fill="#a85e15"/>
      <rect x="1200" y="555" width="34"  height="145" fill="#5a1a14"/>
      <rect x="1238" y="568" width="44"  height="132" fill="#3a2010"/>
      <rect x="1286" y="545" width="32"  height="155" fill="#8b3a1f"/>
      <rect x="1322" y="565" width="42"  height="135" fill="#c97a28" opacity=".9"/>
      <rect x="1368" y="555" width="36"  height="145" fill="#5a1a14"/>
      <rect x="1408" y="568" width="40"  height="132" fill="#3a2010"/>
      <rect x="1452" y="550" width="34"  height="150" fill="#7a2a1a"/>
      <rect x="1490" y="562" width="44"  height="138" fill="#a85e15"/>
      <rect x="1538" y="555" width="36"  height="145" fill="#5a1a14"/>
    </g>
    <!-- shelf top edge highlight -->
    <rect x="0" y="700" width="1600" height="2" fill="#d4a574" opacity=".4"/>
  </g>

  <!-- floating light particles -->
  <g fill="#f6d28a" opacity=".6" filter="url(#blur)">
    <circle cx="980"  cy="180" r="3"/>
    <circle cx="1100" cy="260" r="2"/>
    <circle cx="1200" cy="200" r="2.5"/>
    <circle cx="860"  cy="340" r="2"/>
    <circle cx="1280" cy="380" r="3"/>
    <circle cx="1340" cy="280" r="2"/>
    <circle cx="940"  cy="420" r="2.5"/>
    <circle cx="1180" cy="460" r="2"/>
  </g>

  <!-- grain overlay -->
  <rect width="1600" height="900" filter="url(#grain2)" opacity=".4"/>

  <!-- vignette -->
  <radialGradient id="vig" cx="50%" cy="50%" r="75%">
    <stop offset="0"   stop-color="rgba(0,0,0,0)"/>
    <stop offset=".7"  stop-color="rgba(0,0,0,.05)"/>
    <stop offset="1"   stop-color="rgba(0,0,0,.55)"/>
  </radialGradient>
  <rect width="1600" height="900" fill="url(#vig)"/>
</svg>
